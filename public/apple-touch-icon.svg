<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Left Side: Deep Chinese Crimson -->
  <rect x="0" y="0" width="456" height="1024" fill="#C8102E"/>
  
  <!-- Right Side: Deep Nordic Blue -->
  <rect x="456" y="0" width="568" height="1024" fill="#004F9E"/>
  
  <!-- Vertical Golden Cross Bar -->
  <rect x="444" y="0" width="136" height="1024" fill="url(#gold_grad)" filter="url(#drop_shadow)"/>
  
  <!-- Horizontal Golden Cross Bar -->
  <rect x="0" y="444" width="1024" height="136" fill="url(#gold_grad)" filter="url(#drop_shadow)"/>

  <!-- Upper-Left Canton: Five Gold Stars (Chinese Flag Arrangement) -->
  <g filter="url(#star_glow)">
    <!-- Large Main Star -->
    <use href="#star" transform="translate(230, 260) scale(2.8)"/>
    
    <!-- Four Arched Small Stars pointing to the center of the large star -->
    <use href="#star" transform="translate(340, 150) rotate(-37) scale(1.0)"/>
    <use href="#star" transform="translate(390, 230) rotate(-15) scale(1.0)"/>
    <use href="#star" transform="translate(390, 330) rotate(15) scale(1.0)"/>
    <use href="#star" transform="translate(340, 410) rotate(37) scale(1.0)"/>
  </g>

  <defs>
    <!-- Five-Pointed Star Template -->
    <g id="star">
      <polygon points="0,-24 7,-7 25,-7 10,5 15,22 0,12 -15,22 -10,5 -25,-7 -7,-7" fill="#FFCD00" />
    </g>

    <!-- Premium Metallic Gold Gradient -->
    <linearGradient id="gold_grad" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFE57F"/>
      <stop offset="30%" stop-color="#FFD54F"/>
      <stop offset="50%" stop-color="#D4AF37"/>
      <stop offset="70%" stop-color="#FFC107"/>
      <stop offset="100%" stop-color="#B78727"/>
    </linearGradient>

    <!-- Subtle Drop Shadow for Cross Depth -->
    <filter id="drop_shadow" x="-20" y="-20" width="1064" height="1064" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.25"/>
    </filter>

    <!-- Soft Glow for Golden Stars -->
    <filter id="star_glow" x="100" y="50" width="400" height="500" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#FFCD00" flood-opacity="0.15"/>
    </filter>
  </defs>
</svg>